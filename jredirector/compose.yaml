services:
  redis:
    image: redis:latest
    ports:
      - 6379:6379
  db:
    image: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql

    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

networks:
  default:
    name: cno
    driver: bridge

